<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2727/2727313.png">
    <title>Expense History - RestroManager</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/hamburger.css">
    <link rel="stylesheet" href="css/expense-history.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="hamburger-trigger" onclick="toggleSidebar()"><i class="ri-menu-2-line"></i></div>

    <div id="sidebarMenu" class="custom-sidebar">
        <div class="sidebar-header">
            <div class="nav-logo"><i class="ri-restaurant-2-line"></i><span>RestroManager</span></div>
            <i class="ri-close-line close-sidebar" onclick="toggleSidebar()"></i>
        </div>
        <nav class="sidebar-nav-links">
            <a href="dashboard.html"><i class="ri-home-4-line"></i> <span>Home</span></a>
            <a href="expense-entry.html"><i class="ri-shopping-cart-2-line"></i> <span>Expense Entry</span></a>
            <a href="reconciliation.html"><i class="ri-scales-3-line"></i> <span>Reconciliation</span></a>
            <a href="expense-history.html" class="active"><i class="ri-history-line"></i> <span>Expense History</span></a>
            <a href="tally.html"><i class="ri-money-dollar-box-line"></i> <span>Cash Tally</span></a>
            <a href="tally-history.html"><i class="ri-calendar-check-line"></i> <span>Tally History</span></a>
            <a href="vendors.html"><i class="ri-store-2-line"></i> <span>Vendors</span></a>
            <a href="owner.html"><i class="ri-user-star-line"></i> <span>Owner</span></a>
            <a href="owner-history.html"><i class="ri-file-list-3-line"></i> <span>Owner History</span></a>
            <a href="salary.html"><i class="ri-contacts-book-line"></i> <span>Salary Sheet</span></a>
            <a href="pl.html"><i class="ri-pie-chart-line"></i> <span>Profit & Loss</span></a>
            <a href="settings.html"><i class="ri-settings-3-line"></i> <span>Settings</span></a>
        </nav>
        <div class="sidebar-bottom"><a onclick="logout()" class="logout-link"><i class="ri-logout-box-r-line"></i> <span>Logout</span></a></div>
    </div>
    <div id="menuOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>Expense History 📊</h1>
                <p>Monthly expense summary by date</p>
            </div>
            <div class="filter-box">
                <input type="month" id="historyMonth" onchange="loadMonthlyHistory()">
            </div>
        </div>

        <div class="glass-card desktop-view">
            <div class="table-wrapper">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Total Expense</th>
                            <th width="120">Action</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                    <tfoot>
                        <tr class="total-row">
                            <td>MONTHLY TOTAL</td>
                            <td id="historyTotal" colspan="2">₹0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <div id="mobileHistoryList" class="mobile-view"></div>
    </main>

    <script src="js/config.js?v=68"></script>
    <script src="js/hamburger.js?v=68"></script>
    <script>
        let currentUser = null;

        window.onload = async () => {
            const session = await checkAuth(true);
            currentUser = session.user;
            
            const now = new Date();
            const currentMonth = now.toISOString().substring(0, 7);
            document.getElementById('historyMonth').value = currentMonth;
            
            loadMonthlyHistory();
        };

        async function loadMonthlyHistory() {
            try {
                const monthYear = document.getElementById('historyMonth').value;
                if (!monthYear) {
                    showToast('Please select a month', 'error');
                    return;
                }

                const [year, month] = monthYear.split('-');
                
                const startDate = `${monthYear}-01`;
                
                // মাসের শেষ দিনটি ডাইনামিকলি বের করা (২৮, ২৯, ৩০ বা ৩১)
                const lastDay = new Date(year, month, 0).getDate();
                const endDate = `${monthYear}-${String(lastDay).padStart(2, '0')}`;

                const tbody = document.getElementById('historyBody');
                const mobileList = document.getElementById('mobileHistoryList');
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:30px;">Loading...</td></tr>';
                mobileList.innerHTML = '';

                const { data: expenses, error } = await _supabase.from('expenses')
                    .select('report_date, amount')
                    .eq('user_id', currentUser.id)
                    .gte('report_date', startDate)
                    .lte('report_date', endDate)
                    .order('report_date', { ascending: false });

                if (error) throw error;

                const dailySummary = {};
                if (expenses) {
                    expenses.forEach(exp => {
                        if (!dailySummary[exp.report_date]) {
                            dailySummary[exp.report_date] = 0;
                        }
                        dailySummary[exp.report_date] += exp.amount;
                    });
                }

                tbody.innerHTML = '';
                let monthlyGrandTotal = 0;

                const sortedDates = Object.keys(dailySummary).sort().reverse();
                
                if (sortedDates.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:30px; color:#94a3b8;">No expenses found in this month.</td></tr>';
                    document.getElementById('historyTotal').innerText = `₹0`;
                    return;
                }

                sortedDates.forEach(date => {
                    const totalAmount = dailySummary[date];
                    monthlyGrandTotal += totalAmount;

                    tbody.innerHTML += `
                        <tr>
                            <td style="font-family: monospace; font-weight: 700;">${date}</td>
                            <td style="color: #ef4444; font-weight: 800;">₹${totalAmount.toLocaleString('en-IN')}</td>
                            <td>
                                <button class="btn-details" onclick="viewDayDetails('${date}')">
                                    <i class="ri-file-list-3-line"></i> Expense Details
                                </button>
                            </td>
                        </tr>
                    `;

                    mobileList.innerHTML += `
                        <div class="exp-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 15px; background: white; border-radius: 12px; border: 1px solid #e2e8f0;">
                            <div>
                                <small style="color: #64748b; font-weight: 700;">${date}</small>
                                <h3 style="margin: 5px 0 0 0; color: #ef4444; font-weight: 800;">₹${totalAmount.toLocaleString('en-IN')}</h3>
                            </div>
                            <button class="btn-details" onclick="viewDayDetails('${date}')" style="padding: 10px 15px; background: #eff6ff; border: 1px solid #dbeafe; color: #2563eb; border-radius: 10px; font-weight: 700;">
                                <i class="ri-file-list-3-line"></i> Details
                            </button>
                        </div>
                    `;
                });

                document.getElementById('historyTotal').innerText = `₹${monthlyGrandTotal.toLocaleString('en-IN')}`;
            } catch (error) {
                console.error('Error loading monthly history:', error);
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#ef4444; padding:30px;">Error: ${error.message}</td></tr>`;
                showToast('Failed to load expense history: ' + (error.message || 'Unknown error'), 'error');
            }
        }

        function viewDayDetails(date) {
            window.location.href = `expense-entry.html?date=${date}`;
        }

        async function logout() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
